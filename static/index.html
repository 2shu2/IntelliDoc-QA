<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntelliDoc-QA — 企业知识库智能问答</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { serif: ["'Instrument Serif'", "serif"] },
        }
      }
    }
  </script>

  <!-- React + Babel via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      font-family: 'Instrument Serif', serif;
      height: 100%; overflow: hidden;
      background: #000;
    }

    /* ─── Liquid Glass ─── */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.02);
      background-blend-mode: luminosity;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative; overflow: hidden;
    }
    .liquid-glass::before {
      content: '';
      position: absolute; inset: 0; border-radius: inherit; padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    .liquid-glass-solid {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .dark-mode .liquid-glass {
      background: rgba(24, 44, 65, 0.15);
      box-shadow: inset 0 1px 1px rgba(24, 44, 65, 0.1);
    }

    /* ─── Video Crossfade ─── */
    .video-layer { transition: opacity 1000ms ease-in-out; }
    .video-layer.active { opacity: 1; }
    .video-layer.inactive { opacity: 0; }

    /* ─── Train Bob Animation ─── */
    @keyframes train-bob {
      0%, 100% { transform: scale(1.03) translateY(0); }
      50% { transform: scale(1.03) translateY(-6px); }
    }
    .overlay-bob { animation: train-bob 3s ease-in-out infinite; }

    /* ─── Dark Mode Transition ─── */
    .content-layer { transition: color 700ms ease; }
    .content-layer.dark { color: #182C41; }

    /* ─── Scrollbar ─── */
    .chat-scroll::-webkit-scrollbar { width: 4px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* ─── Mobile menu ─── */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .menu-item-enter { animation: fadeInUp 500ms cubic-bezier(0.4,0,0.2,1) forwards; opacity: 0; }

    /* ─── Stats Divider ─── */
    .stats-divider { color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Constants ───
    const VIDEOS = [
      { url: "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260702_081127_0992a171-d3c6-4978-8213-0ec5df8b6d63.mp4", label: "Golden Hour" },
      { url: "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260702_092026_dd05b805-ea0f-40b2-8c52-332b88502592.mp4", label: "Still Water" },
      { url: "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260702_081042_df7202bf-bd80-4b2b-bbc6-1f09ba2870e9.mp4", label: "Deep Woods" },
      { url: "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260702_080959_4cac5234-3573-464e-a5b7-76b94b8a7d61.mp4", label: "Quiet Dawn" },
    ];

    const API = ""; // same-origin

    // ─── App ───
    function App() {
      const [activeVideo, setActiveVideo] = useState(0);
      const [isTransitioning, setIsTransitioning] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [sessionId, setSessionId] = useState(null);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [uploading, setUploading] = useState(false);
      const [uploadMsg, setUploadMsg] = useState(null);
      const [view, setView] = useState("hero"); // "hero" | "chat"
      const chatRef = useRef(null);
      const fileRef = useRef(null);

      const isDark = activeVideo === 2;

      // Init session
      useEffect(() => {
        fetch(`${API}/api/session`).then(r => r.json()).then(d => setSessionId(d.session_id));
      }, []);

      // Auto scroll
      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [messages]);

      // Video switch
      const switchVideo = useCallback((idx) => {
        if (idx === activeVideo || isTransitioning) return;
        setIsTransitioning(true);
        setActiveVideo(idx);
        setTimeout(() => setIsTransitioning(false), 1000);
      }, [activeVideo, isTransitioning]);

      // Send question
      const sendQuestion = async (q) => {
        if (!q?.trim() || loading) return;
        const question = q.trim();
        setMessages(prev => [...prev, { role: "user", content: question }]);
        setInput("");
        setLoading(true);
        try {
          const res = await fetch(`${API}/api/ask`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question, session_id: sessionId }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "问答出错");
          setMessages(prev => [...prev, { role: "assistant", content: data.answer }]);
        } catch (e) {
          setMessages(prev => [...prev, { role: "assistant", content: `❌ ${e.message}`, error: true }]);
        }
        setLoading(false);
      };

      // Upload files
      const handleUpload = async (e) => {
        const files = e.target.files;
        if (!files?.length) return;
        setUploading(true);
        setUploadMsg(null);
        const formData = new FormData();
        for (const f of files) formData.append("files", f);
        try {
          const res = await fetch(`${API}/api/upload`, { method: "POST", body: formData });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || "上传失败");
          setUploadMsg({ type: "success", text: data.message });
          setView("chat");
        } catch (err) {
          setUploadMsg({ type: "error", text: err.message });
        }
        setUploading(false);
        e.target.value = "";
      };

      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendQuestion(input);
        }
      };

      const darkClass = isDark ? "dark" : "";

      return (
        <section className="relative w-full h-screen overflow-hidden bg-black">
          {/* ── Video Layers ── */}
          {VIDEOS.map((v, i) => (
            <video
              key={i}
              className={`video-layer absolute inset-0 w-full h-full object-cover ${i === activeVideo ? "active" : "inactive"}`}
              src={v.url}
              autoPlay muted loop playsInline
            />
          ))}

          {/* ── Overlay PNG ── */}
          <img
            className="absolute inset-0 w-full h-full object-cover z-[1] pointer-events-none overlay-bob"
            src="https://soft-zoom-63098134.figma.site/_assets/v11/0b4a435b2df2747593c43d7a1c9b4578f7d8d90c.png"
            alt=""
          />

          {/* ── Content Layer ── */}
          <div className={`content-layer ${darkClass} absolute inset-0 z-[2] flex flex-col overflow-hidden`}>
            {/* Nav */}
            <nav className="flex items-center justify-between px-5 sm:px-8 py-4">
              <h1 className="text-white italic text-xl sm:text-2xl" style={{fontFamily:"'Instrument Serif',serif"}}>
                IntelliDoc-QA
              </h1>

              {/* Desktop Nav */}
              <div className="hidden md:flex items-center gap-1.5">
                <div className="liquid-glass rounded-full flex items-center gap-1 px-2 py-1.5">
                  {["Features","Upload","Pricing","Community"].map(link => (
                    <button key={link} className="text-white/80 hover:text-white text-sm px-3 py-1 rounded-full transition-colors"
                      style={{fontFamily:"system-ui,sans-serif"}}
                      onClick={() => { if (link === "Upload") fileRef.current?.click(); }}>
                      {link}
                    </button>
                  ))}
                  <button className="bg-white text-black text-sm font-medium px-4 py-1.5 rounded-full ml-1 hover:bg-white/90 transition-all"
                    style={{fontFamily:"system-ui,sans-serif"}}
                    onClick={() => setView("chat")}>
                    Start Q&A
                  </button>
                </div>
              </div>

              {/* Mobile Hamburger */}
              <button className="md:hidden liquid-glass w-10 h-10 rounded-full flex items-center justify-center text-white"
                onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                <span className={`transition-all duration-300 ${mobileMenuOpen ? "rotate-90 scale-75 opacity-0 absolute" : "opacity-100"}`}>
                  <MenuIcon />
                </span>
                <span className={`transition-all duration-300 ${mobileMenuOpen ? "opacity-100" : "-rotate-90 scale-75 opacity-0 absolute"}`}>
                  <XIcon />
                </span>
              </button>
            </nav>

            {/* Mobile Menu */}
            {mobileMenuOpen && (
              <div className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center gap-6"
                onClick={() => setMobileMenuOpen(false)}>
                {["How It Works","Features","Pricing","Community"].map((link, i) => (
                  <button key={link} className="text-white text-3xl menu-item-enter"
                    style={{animationDelay:`${100 + i*50}ms`, fontFamily:"'Instrument Serif',serif"}}
                    onClick={() => { setMobileMenuOpen(false); if (link === "Features") fileRef.current?.click(); }}>
                    {link}
                  </button>
                ))}
                <button className="mt-4 bg-white text-black px-8 py-3 rounded-full text-lg font-medium menu-item-enter"
                  style={{animationDelay:"300ms", fontFamily:"system-ui,sans-serif"}}
                  onClick={() => { setMobileMenuOpen(false); setView("chat"); }}>
                  Get Started
                </button>
              </div>
            )}

            {/* ── Hero / Chat ── */}
            <div className="flex-1 flex flex-col items-center px-5 overflow-hidden" style={{justifyContent: view === "hero" ? "center" : "flex-start"}}>
              {view === "hero" ? (
                /* ══════ HERO ══════ */
                <div className="flex flex-col items-center text-center gap-5 sm:gap-7 max-w-4xl">
                  {/* Badge */}
                  <div className="liquid-glass rounded-full px-5 py-2">
                    <span className="text-white/90 text-sm" style={{fontFamily:"system-ui,sans-serif"}}>
                      AI-powered document intelligence
                    </span>
                  </div>

                  {/* Heading */}
                  <h1 className="text-white text-4xl sm:text-5xl md:text-7xl lg:text-[5.5rem] leading-[1.1] max-w-4xl"
                    style={{fontFamily:"'Instrument Serif',serif"}}>
                    Ask Your Documents.<br/>
                    Get Instant Answers.
                  </h1>

                  {/* Subtext */}
                  <p className="text-white/70 max-w-xl leading-relaxed text-base sm:text-lg"
                    style={{fontFamily:"system-ui,sans-serif"}}>
                    Upload PDF, Word, TXT, or HTML files. Our AI reads, understands,
                    and answers your questions with precision — powered by RAG and DeepSeek.
                  </p>

                  {/* Upload CTA */}
                  <div className="flex flex-col sm:flex-row items-center gap-3 w-full max-w-sm">
                    <input ref={fileRef} type="file" className="hidden"
                      accept=".pdf,.docx,.txt,.html,.htm" multiple onChange={handleUpload} />
                    <button
                      className="w-full liquid-glass rounded-full flex items-center gap-2 px-5 py-3 text-white/60 hover:text-white/90 transition-colors cursor-pointer text-sm"
                      style={{fontFamily:"system-ui,sans-serif"}}
                      onClick={() => fileRef.current?.click()}>
                      <UploadIcon /> Choose documents to upload
                    </button>
                    <button
                      className="w-full sm:w-auto whitespace-nowrap bg-white text-black font-medium px-6 py-3 rounded-full hover:bg-white/90 transition-all text-sm"
                      style={{fontFamily:"system-ui,sans-serif"}}
                      onClick={() => fileRef.current?.click()}>
                      Get Started
                    </button>
                  </div>

                  {uploading && (
                    <p className="text-white/60 text-sm animate-pulse" style={{fontFamily:"system-ui,sans-serif"}}>
                      Processing documents...
                    </p>
                  )}
                  {uploadMsg && (
                    <p className={`text-sm ${uploadMsg.type === "success" ? "text-green-300" : "text-red-300"}`}
                      style={{fontFamily:"system-ui,sans-serif"}}>
                      {uploadMsg.text}
                    </p>
                  )}

                  {/* Video Switcher */}
                  <div className="flex items-center gap-1 sm:gap-2 mt-4">
                    {VIDEOS.map((v, i) => (
                      <button key={i}
                        className="text-xs sm:text-sm px-3 py-1.5 rounded-full transition-all border-b-2"
                        style={{
                          fontFamily: "system-ui,sans-serif",
                          color: i === activeVideo ? "#fff" : "rgba(255,255,255,0.5)",
                          borderColor: i === activeVideo ? "#fff" : "transparent",
                        }}
                        onMouseEnter={e => { if (i !== activeVideo) e.target.style.color = "rgba(255,255,255,0.8)"; }}
                        onMouseLeave={e => { if (i !== activeVideo) e.target.style.color = "rgba(255,255,255,0.5)"; }}
                        onClick={() => switchVideo(i)}>
                        {v.label}
                      </button>
                    ))}
                  </div>
                </div>
              ) : (
                /* ══════ CHAT ══════ */
                <div className="w-full max-w-3xl flex flex-col pt-2 pb-4" style={{flex:1, minHeight:0}}>
                  {/* Back + Upload Row */}
                  <div className="flex items-center gap-3 mb-3">
                    <button onClick={() => setView("hero")}
                      className="liquid-glass rounded-full w-9 h-9 flex items-center justify-center text-white/70 hover:text-white transition-colors">
                      <ChevronLeftIcon />
                    </button>
                    <span className="text-white/60 text-sm" style={{fontFamily:"system-ui,sans-serif"}}>
                      {messages.length > 0 ? `${messages.length} messages` : "Ask anything about your documents"}
                    </span>
                    <div className="flex-1" />
                    <input ref={fileRef} type="file" className="hidden"
                      accept=".pdf,.docx,.txt,.html,.htm" multiple onChange={handleUpload} />
                    <button onClick={() => fileRef.current?.click()}
                      className="liquid-glass rounded-full w-9 h-9 flex items-center justify-center text-white/70 hover:text-white transition-colors"
                      title="Upload documents">
                      {uploading ? <SpinnerIcon /> : <UploadIcon />}
                    </button>
                  </div>

                  {uploadMsg && (
                    <p className={`text-xs mb-2 ${uploadMsg.type === "success" ? "text-green-300" : "text-red-300"}`}
                      style={{fontFamily:"system-ui,sans-serif"}}>
                      {uploadMsg.text}
                    </p>
                  )}

                  {/* Messages */}
                  <div ref={chatRef} className="chat-scroll space-y-3 mb-3" style={{flex:1, minHeight:0, overflowY:"auto", WebkitOverflowScrolling:"touch"}}>
                    {messages.length === 0 && (
                      <div className="flex flex-col items-center justify-center h-full text-white/30 gap-3">
                        <MessageCircleIcon size={48} />
                        <p className="text-sm" style={{fontFamily:"system-ui,sans-serif"}}>
                          Upload documents and start asking questions
                        </p>
                      </div>
                    )}
                    {messages.map((msg, i) => (
                      <div key={i} className={`flex ${msg.role === "user" ? "justify-end" : "justify-start"}`}>
                        <div className={`max-w-[85%] sm:max-w-[75%] rounded-2xl px-4 py-3 ${
                          msg.role === "user"
                            ? "liquid-glass-solid text-white/90"
                            : msg.error
                              ? "bg-red-500/20 text-red-200"
                              : isDark
                                ? "liquid-glass text-[#182C41]"
                                : "liquid-glass text-white/90"
                        }`}>
                          <p className="text-sm leading-relaxed whitespace-pre-wrap"
                            style={{fontFamily:"system-ui,sans-serif"}}>
                            {msg.content}
                          </p>
                        </div>
                      </div>
                    ))}
                    {loading && (
                      <div className="flex justify-start">
                        <div className="liquid-glass rounded-2xl px-5 py-3">
                          <span className="inline-flex gap-1">
                            <span className="w-2 h-2 bg-white/40 rounded-full animate-bounce" style={{animationDelay:"0ms"}} />
                            <span className="w-2 h-2 bg-white/40 rounded-full animate-bounce" style={{animationDelay:"150ms"}} />
                            <span className="w-2 h-2 bg-white/40 rounded-full animate-bounce" style={{animationDelay:"300ms"}} />
                          </span>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* Input */}
                  <div className="liquid-glass rounded-full flex items-center px-2 py-1.5">
                    <input
                      type="text" value={input} onChange={e => setInput(e.target.value)}
                      onKeyDown={handleKeyDown}
                      placeholder="Ask anything about your documents..."
                      className="flex-1 bg-transparent text-white placeholder-white/30 px-3 py-1.5 outline-none text-sm"
                      style={{fontFamily:"system-ui,sans-serif"}}
                      disabled={loading}
                    />
                    <button
                      onClick={() => sendQuestion(input)}
                      disabled={loading || !input.trim()}
                      className="bg-white text-black rounded-full w-9 h-9 flex items-center justify-center hover:bg-white/90 transition-all disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0">
                      <SendIcon />
                    </button>
                  </div>
                </div>
              )}
            </div>

            {/* ── Bottom Stats ── */}
            <div className="flex items-center justify-center gap-2 sm:gap-4 pb-5 px-4 flex-wrap"
              style={{fontFamily:"system-ui,sans-serif"}}>
              {["PDF & Word Docs","MMR Smart Retrieval","DeepSeek Powered","Multi-turn Memory"].map((s, i) => (
                <span key={s} className="flex items-center gap-2">
                  <span className="text-white/50 text-xs sm:text-sm">{s}</span>
                  {i < 3 && <span className="stats-divider text-xs">|</span>}
                </span>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // ── Icon Components ──
    const MenuIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>
      </svg>
    );
    const XIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    );
    const UploadIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    );
    const SendIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    );
    const ChevronLeftIcon = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    );
    const MessageCircleIcon = ({size=24}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
    );
    const SpinnerIcon = () => (
      <svg className="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="12" cy="12" r="10" stroke="currentColor" strokeOpacity="0.2" /><path d="M12 2a10 10 0 019.95 9" strokeLinecap="round"/>
      </svg>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
